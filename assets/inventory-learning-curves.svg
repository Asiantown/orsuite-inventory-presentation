<svg xmlns="http://www.w3.org/2000/svg" width="820" height="500" viewBox="0 0 820 500" role="img" aria-labelledby="plot-title plot-description">
<title id="plot-title">Dual-sourcing inventory learning curves</title>
<desc id="plot-description">Held-out mean inventory cost per period against actual training timesteps for PPO and DQN. Lower is better. Shaded bands show plus or minus one standard deviation across training seeds, and the green dashed line is an adapted TBS reference.</desc>
