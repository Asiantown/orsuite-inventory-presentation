<text x="83" y="48.0" font-family="Arial" text-anchor="end" font-size="12">11045</text>
<text x="92.0" y="394" font-family="Arial" text-anchor="middle" font-size="12">0</text>
<text x="265.5" y="394" font-family="Arial" text-anchor="middle" font-size="12">12,544</text>
<text x="439.0" y="394" font-family="Arial" text-anchor="middle" font-size="12">25,088</text>
<text x="612.5" y="394" font-family="Arial" text-anchor="middle" font-size="12">37,632</text>
<text x="786.0" y="394" font-family="Arial" text-anchor="middle" font-size="12">50,176</text>
